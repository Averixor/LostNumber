name: Deploy static site to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Pages artifact
        run: npm run build:pages

      - name: Verify Pages output
        run: |
          test -f _site/index.html
          test -f _site/.nojekyll
          find _site -type l -print -quit | (! read)
          du -sh _site
          find _site -type f | wc -l

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before Pages deploy retry
        if: steps.deploy.outcome != 'success'
        run: sleep 20

      - name: Retry Pages deploy (2/3)
        if: steps.deploy.outcome != 'success'
        id: deploy2
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before final Pages deploy retry
        if: steps.deploy.outcome != 'success' && steps.deploy2.outcome != 'success'
        run: sleep 20

      - name: Retry Pages deploy (3/3)
        if: steps.deploy.outcome != 'success' && steps.deploy2.outcome != 'success'
        id: deploy3
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Verify Pages deploy
        if: >-
          steps.deploy.outcome != 'success' &&
          steps.deploy2.outcome != 'success' &&
          steps.deploy3.outcome != 'success'
        run: |
          echo "GitHub Pages deploy failed after 3 attempts."
          echo "This is usually a transient GitHub API issue."
          echo "Re-run failed jobs from Actions, or wait a few minutes and push again."
          exit 1
