plugins {
    id 'com.android.library' version '8.6.1'
}

android {
    namespace 'com.averixor.lostnumber'
    compileSdk 35

    defaultConfig {
        minSdk 24
        targetSdk 35
        consumerProguardFiles 'proguard-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly files('../../build/libs/release/godot-lib.template_release.aar')
}
