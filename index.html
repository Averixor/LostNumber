    <script>
      (function () {
        function computeBasePath() {
          var path = window.location.pathname || '/';
          if (!path.endsWith('/')) {
            var last = path.split('/').pop() || '';
            if (last.indexOf('.') !== -1) {
              path = path.slice(0, path.lastIndexOf('/') + 1);
            } else {
              path = path + '/';
            }
          }
          return path;
        }

        function shouldLogBaseErrors() {
          var host = (window.location.hostname || '').toLowerCase();
          var local =
            host === 'localhost' ||
            host === '127.0.0.1' ||
            host === '[::1]' ||
            host.endsWith('.local');
          var u = window.location.search || '';
          return (
            local ||
            u.indexOf('debug=1') !== -1 ||
            u.indexOf('debug=full') !== -1 ||
            u.indexOf('dev=1') !== -1
          );
        }

        function logBaseFailure(e) {
          if (shouldLogBaseErrors() && typeof console !== 'undefined' && console.warn) {
            console.warn('[LN_BASE] base path bootstrap failed:', e);
          }
        }

        var path = computeBasePath();
        var existingBase = document.querySelector('base');
        if (existingBase) {
          var existingHref = existingBase.getAttribute('href');
          if (!existingHref) {
            try {
              existingBase.href = path;
            } catch (e) {
              logBaseFailure(e);
            }
          }
          return;
        }

        try {
          var b = document.createElement('base');
          b.href = path;
          var cs = document.querySelector('meta[charset]');
          if (cs && cs.parentNode) {
            cs.parentNode.insertBefore(b, cs.nextSibling);
          } else {
            document.head.prepend(b);
          }
        } catch (e) {
          logBaseFailure(e);
        }
      })();
    </script>

    <script>
      (function () {
        'use strict';

        var flags = window.LN_BUILD_FLAGS;
        if (!flags || typeof flags !== 'object') {
          window.LN_BUILD_FLAGS = { cheatsEnabled: false };
        } else if (flags.cheatsEnabled !== true) {
          flags.cheatsEnabled = false;
        }

        function isLocalDevEnvironment() {
          try {
            var loc = window.location;
            var protocol = (loc.protocol || '').toLowerCase();
            if (protocol === 'file:') {
              return true;
            }

            var host = (loc.hostname || '').toLowerCase();
            if (
              host === 'localhost' ||
              host === '127.0.0.1' ||
              host === '::1' ||
              host === '[::1]' ||
              host.endsWith('.local')
            ) {
              return true;
            }

            if (/^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(host)) {
              return true;
            }
            if (/^192\.168\.\d{1,3}\.\d{1,3}$/.test(host)) {
              return true;
            }
            if (/^172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3}$/.test(host)) {
              return true;
            }

            return false;
          } catch (_) {
            return false;
          }
        }

        window.LN_isLocalDevEnvironment = isLocalDevEnvironment;

        window.LN_isDevToolsAllowed = function LN_isDevToolsAllowed() {
          if (window.LN_BUILD_FLAGS.cheatsEnabled === true) {
            return true;
          }
          return isLocalDevEnvironment();
        };
      })();
    </script>

      (function () {
        function loadDevToolScripts() {
          if (window.__LN_DEV_BUNDLES_REQUESTED__) {
            return;
          }
          if (typeof window.LN_isDevToolsAllowed !== 'function' || !window.LN_isDevToolsAllowed()) {
            return;
          }
          window.__LN_DEV_BUNDLES_REQUESTED__ = true;

          var sources = [
            'js/app/dev/dev-tools.js',
            'js/app/dev/performance-monitor.js',
            'js/system/dev/cheats.js',
          ];
          var load = window.LN_loadScriptOnce;

          sources.forEach(function (src) {
            if (typeof load === 'function') {
              load(src).catch(function () {});
              return;
            }
            if (document.querySelector('script[src="' + src + '"]')) {
              return;
            }
            var s = document.createElement('script');
            s.src = src;
            s.defer = true;
            document.head.appendChild(s);
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', loadDevToolScripts, { once: true });
        } else {
          loadDevToolScripts();
        }
      })();
    </script>
