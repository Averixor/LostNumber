    <script>
      (function () {
        function computeBasePath() {
          var path = window.location.pathname || '/';
          if (!path.endsWith('/')) {
            var last = path.split('/').pop() || '';
            if (last.indexOf('.') !== -1) {
              path = path.slice(0, path.lastIndexOf('/') + 1);
            } else {
              path = path + '/';
            }
          }
          return path;
        }

        function shouldLogBaseErrors() {
          var host = (window.location.hostname || '').toLowerCase();
          var local =
            host === 'localhost' ||
            host === '127.0.0.1' ||
            host === '[::1]' ||
            host.endsWith('.local');
          var u = window.location.search || '';
          return (
            local ||
            u.indexOf('debug=1') !== -1 ||
            u.indexOf('debug=full') !== -1 ||
            u.indexOf('dev=1') !== -1
          );
        }

        function logBaseFailure(e) {
          if (shouldLogBaseErrors() && typeof console !== 'undefined' && console.warn) {
            console.warn('[LN_BASE] base path bootstrap failed:', e);
          }
        }

        var path = computeBasePath();
        var existingBase = document.querySelector('base');
        if (existingBase) {
          var existingHref = existingBase.getAttribute('href');
          if (!existingHref) {
            try {
              existingBase.href = path;
            } catch (e) {
              logBaseFailure(e);
            }
          }
          return;
        }

        try {
          var b = document.createElement('base');
          b.href = path;
          var cs = document.querySelector('meta[charset]');
          if (cs && cs.parentNode) {
            cs.parentNode.insertBefore(b, cs.nextSibling);
          } else {
            document.head.prepend(b);
          }
        } catch (e) {
          logBaseFailure(e);
        }
      })();
    </script>

    <script>
      (function () {
        'use strict';

        var flags = window.LN_BUILD_FLAGS;
        if (!flags || typeof flags !== 'object') {
          window.LN_BUILD_FLAGS = { cheatsEnabled: false };
        } else if (flags.cheatsEnabled !== true) {
          flags.cheatsEnabled = false;
        }

        function isCapacitorNative() {
          try {
            return !!(
              window.Capacitor &&
              typeof window.Capacitor.isNativePlatform === 'function' &&
              window.Capacitor.isNativePlatform()
            );
          } catch (_) {
            return false;
          }
        }

        function isLocalDevEnvironment() {
          try {
            if (isCapacitorNative()) {
              return false;
            }

            var loc = window.location;
            var protocol = (loc.protocol || '').toLowerCase();
            if (protocol === 'file:') {
              return true;
            }

            var host = (loc.hostname || '').toLowerCase();
            if (
              host === 'localhost' ||
              host === '127.0.0.1' ||
              host === '::1' ||
              host === '[::1]' ||
              host.endsWith('.local')
            ) {
              return true;
            }

            if (/^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(host)) {
              return true;
            }
            if (/^192\.168\.\d{1,3}\.\d{1,3}$/.test(host)) {
              return true;
            }
            if (/^172\.(1[6-9]|2\d|3[0-1])\.\d{1,3}\.\d{1,3}$/.test(host)) {
              return true;
            }

            return false;
          } catch (_) {
            return false;
          }
        }

        window.LN_isLocalDevEnvironment = isLocalDevEnvironment;

        window.LN_isDevToolsAllowed = function LN_isDevToolsAllowed() {
          if (window.LN_BUILD_FLAGS.cheatsEnabled === true) {
            return true;
          }
          return isLocalDevEnvironment();
        };
      })();
    </script>
